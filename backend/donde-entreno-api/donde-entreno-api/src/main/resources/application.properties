# Nombre interno de la aplicaciÛn
spring.application.name=donde-entreno-api

# Puerto donde va a levantar el backend
server.port=8080

# Perfil activo por defecto para desarrollo local
spring.profiles.active=local

# ===============================
# CONFIGURACI”N DE JPA / HIBERNATE
# ===============================

# Le decimos a Hibernate que NO cree, modifique ni borre tablas.
# Como vos ya creaste la base con scripts SQL, esto es importante.
spring.jpa.hibernate.ddl-auto=none

# Muestra en consola las consultas SQL que ejecute JPA.
# M·s adelante podemos apagarlo.
spring.jpa.show-sql=true

# Formatea las consultas SQL para que sean m·s legibles en consola.
spring.jpa.properties.hibernate.format_sql=true

# Dialecto especÌfico para PostgreSQL.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect