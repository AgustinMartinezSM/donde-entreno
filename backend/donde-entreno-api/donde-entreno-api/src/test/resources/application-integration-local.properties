# Perfil reservado para futuros tests *IT ejecutados con:
# .\mvnw.cmd verify -Pintegration-local
# Cada test de integracion debe usar @ActiveProfiles("integration-local")
# y verificar que la URL efectiva apunte a localhost o 127.0.0.1 antes de persistir.

spring.datasource.url=jdbc:postgresql://localhost:5432/dondeentreno_db
spring.datasource.username=${DONDEENTRENO_TEST_DB_USERNAME}
spring.datasource.password=${DONDEENTRENO_TEST_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
